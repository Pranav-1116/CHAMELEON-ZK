# .github/workflows/ci.yml
name: Chameleon-ZK CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # Job 1: Rust Prover Tests
  rust-tests:
    name: Rust Prover Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
          components: rustfmt, clippy
      
      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Cache cargo build
        uses: actions/cache@v3
        with:
          path: prover/target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Run cargo fmt
        working-directory: ./prover
        run: cargo fmt -- --check
      
      - name: Run clippy
        working-directory: ./prover
        run: cargo clippy -- -D warnings
      
      - name: Run tests
        working-directory: ./prover
        run: cargo test --release --verbose
      
      - name: Build prover
        working-directory: ./prover
        run: cargo build --release
      
      - name: Upload prover binary
        uses: actions/upload-artifact@v3
        with:
          name: chameleon-prover
          path: prover/target/release/chameleon-prover

  # Job 2: Circuit Compilation
  circuit-tests:
    name: Circuit Compilation & Verification
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: circuits/package-lock.json
      
      - name: Install Circom
        run: |
          git clone https://github.com/iden3/circom.git /tmp/circom
          cd /tmp/circom
          cargo build --release
          sudo cp target/release/circom /usr/local/bin/
          circom --version
      
      - name: Install circuit dependencies
        working-directory: ./circuits
        run: npm ci
      
      - name: Compile state_commitment circuit
        working-directory: ./circuits
        run: |
          circom state_commitment.circom --r1cs --wasm --sym -o build/state_commitment_ci
          ls -lh build/state_commitment_ci/
      
      - name: Compile morph_validator circuit
        working-directory: ./circuits
        run: |
          circom morph_validator.circom --r1cs --wasm --sym -o build/morph_validator_ci
          ls -lh build/morph_validator_ci/
      
      - name: Install snarkjs
        run: npm install -g snarkjs
      
      - name: Verify circuit constraints
        working-directory: ./circuits
        run: |
          snarkjs r1cs info build/state_commitment_ci/state_commitment.r1cs
          snarkjs r1cs info build/morph_validator_ci/morph_validator.r1cs
      
      - name: Upload circuit artifacts
        uses: actions/upload-artifact@v3
        with:
          name: circuits
          path: circuits/build/

  # Job 3: Smart Contract Tests
  contract-tests:
    name: Smart Contract Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
      
      - name: Install dependencies
        working-directory: ./contracts
        run: forge install
      
      - name: Build contracts
        working-directory: ./contracts
        run: forge build --sizes
      
      - name: Run tests
        working-directory: ./contracts
        run: forge test -vvv
      
      - name: Generate gas report
        working-directory: ./contracts
        run: forge test --gas-report > gas-report.txt
      
      - name: Upload gas report
        uses: actions/upload-artifact@v3
        with:
          name: gas-report
          path: contracts/gas-report.txt
      
      - name: Check contract sizes
        working-directory: ./contracts
        run: |
          forge build --sizes | tee contract-sizes.txt
          # Fail if any contract exceeds 24KB
          if grep -q "exceeds" contract-sizes.txt; then
            echo "ERROR: Contract size limit exceeded!"
            exit 1
          fi

  # Job 4: Integration Tests
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [rust-tests, circuit-tests, contract-tests]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download prover binary
        uses: actions/download-artifact@v3
        with:
          name: chameleon-prover
          path: prover/target/release/
      
      - name: Make prover executable
        run: chmod +x prover/target/release/chameleon-prover
      
      - name: Download circuit artifacts
        uses: actions/download-artifact@v3
        with:
          name: circuits
          path: circuits/build/
      
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
      
      - name: Start local Ethereum node
        run: |
          anvil &
          sleep 5
      
      - name: Run integration tests
        run: ./scripts/integration_test.sh
      
      - name: Run full demo
        run: timeout 300 ./scripts/full_demo.sh || true

  # Job 5: Security Checks
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run Slither (Solidity)
        uses: crytic/slither-action@v0.3.0
        with:
          target: contracts/
          fail-on: high
          ignore-compile: true
      
      - name: Run cargo audit (Rust)
        working-directory: ./prover
        run: |
          cargo install cargo-audit
          cargo audit
      
      - name: Run npm audit (Circuits)
        working-directory: ./circuits
        run: npm audit --audit-level=high

  # Job 6: Code Coverage
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
      
      - name: Install tarpaulin
        run: cargo install cargo-tarpaulin
      
      - name: Generate coverage
        working-directory: ./prover
        run: cargo tarpaulin --out Xml --output-dir ../coverage
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/cobertura.xml
          flags: rust
      
      - name: Contract coverage
        working-directory: ./contracts
        run: forge coverage --report lcov
      
      - name: Upload contract coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./contracts/lcov.info
          flags: solidity