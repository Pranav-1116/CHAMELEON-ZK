name: Chameleon-ZK CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # Job 1: Rust Tests (Simplified)
  rust-tests:
    name: Rust Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Cache cargo
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            prover/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Build prover
        working-directory: ./prover
        run: cargo build --release
      
      - name: Run tests
        working-directory: ./prover
        run: cargo test --release

  # Job 2: Contract Tests (Simplified)
  contract-tests:
    name: Contract Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
      
      - name: Build contracts
        working-directory: ./contracts
        run: forge build
      
      - name: Run tests
        working-directory: ./contracts
        run: forge test -vvv

  # Job 3: Circuit Check (Simplified)
  circuit-check:
    name: Circuit Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: circuits/package-lock.json
      
      - name: Check circuits exist
        run: |
          ls -lh circuits/state_commitment.circom
          ls -lh circuits/morph_validator.circom
          echo "✓ Circuits exist"
